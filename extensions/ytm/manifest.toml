api = 5
name = "ytm"
version = "0.2.0"
description = "Search YouTube Music and control playback - play now, play next, add to queue. Requires the Firefox companion (companions/firefox-ytm), which runs search and playback in your logged-in music.youtube.com tab."
author = "Portunus examples"
homepage = "https://music.youtube.com"
kinds = ["ext-ytm"]

# One scope command. Type a song/artist, results stream in from the logged-in
# YouTube Music tab (via the companion) or from a public search as a fallback.
[[commands]]
name = "search"
title = "YouTube Music"
description = "Search songs and control playback"
mode = "scope"
keywords = ["ytm", "music", "yt", "song", "play"]
min_query_len = 2
chip = "YT Music"
icon = "icon.b64"
placeholder = "Search YouTube Music…"

# Live queue view: lists the current queue, marks now-playing, skip-to / remove.
# min_query_len = 0 so it populates on entry with no typing; a typed term
# filters the queue client-side. Backed by the same companion bus.
[[commands]]
name = "queue"
title = "YT Music Queue"
description = "See the current queue - skip to or remove tracks"
mode = "scope"
keywords = ["queue", "q", "up next", "playing", "np"]
min_query_len = 0
chip = "YT Queue"
icon = "icon.b64"
placeholder = "Filter the queue…"
# Queue order is intrinsic (playback position) - opt out of frecency so a
# frequently-skipped track never floats to the top. Pairs with the stable
# row ids that let a post-skip RefreshResults update in place.
frecency = false

[permissions]
# Talk to the Firefox companion (personalized search + queue control).
bus = true
# Cache queue-row album art (videoId -> base64) so icons load instantly after
# the first fetch and survive skip/refresh.
kv = true
# Album-art hosts, fetched on demand for the selection preview and queue-row
# icons. Search results use lh3/yt3; queue thumbnails come from i.ytimg.com.
# Search and playback go through the companion, not the network.
network = ["lh3.googleusercontent.com", "yt3.googleusercontent.com", "i.ytimg.com"]
# "Open in browser" action + the web-search placeholder.
open_url = true

[limits]
# All the real work is the async query tier (bus round-trip or network).
search_timeout_ms = 50
query_timeout_ms = 10000
activate_timeout_ms = 6000
# Preview fetches one album-art image on selection.
preview_timeout_ms = 8000
